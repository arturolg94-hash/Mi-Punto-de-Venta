<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGV Ultimate v2.8.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .app-tab { display: none; }
        .app-tab.active { display: block; }
        .nav-active { color: #4f46e5; border-top: 3px solid #4f46e5; }
        .btn-pago-active { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
        #barraProgreso { transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <div id="loginScreen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100 text-center">
            <div class="bg-indigo-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">💼</span>
            </div>
            <h1 class="text-3xl font-black text-indigo-600 italic uppercase tracking-tighter">SGV PRO v2.8.3</h1>
            <p class="text-slate-400 text-xs mb-8 font-bold">SISTEMA DE CONTROL PROFESIONAL</p>
            <div class="space-y-4 text-left">
                <input type="text" id="gasUrlInput" class="w-full px-6 py-4 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="URL de Google Script (/exec)">
                <input type="text" id="userInput" class="w-full px-6 py-4 border rounded-2xl outline-none" placeholder="Usuario" value="admin">
                <input type="password" id="passInput" class="w-full px-6 py-4 border rounded-2xl outline-none" placeholder="Contraseña" value="admin123">
                <button onclick="intentarLogin()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">ENTRAR AL PANEL</button>
            </div>
        </div>
    </div>

    <div id="appScreen" class="hidden flex-1 flex flex-col">
        <header class="bg-indigo-600 text-white p-5 flex justify-between items-center sticky top-0 z-50 shadow-lg">
            <div>
                <h1 class="font-black text-xl italic tracking-tighter">SGV PRO</h1>
                <p id="userBanner" class="text-[9px] font-black uppercase tracking-widest opacity-80"></p>
            </div>
            <button onclick="logout()" class="text-[10px] font-bold bg-indigo-500 px-4 py-2 rounded-xl">SALIR</button>
        </header>

        <main class="flex-1 p-4 max-w-4xl w-full mx-auto pb-32">
            
            <div id="tab-vender" class="app-tab active space-y-4">
                <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4">
                    <h2 class="font-black text-indigo-600 uppercase text-xs tracking-widest italic">🛒 Punto de Venta</h2>
                    <div id="reader-vender" class="rounded-2xl overflow-hidden hidden border-4 border-indigo-50"></div>
                    <div class="flex gap-2">
                        <input type="text" id="buscarCodigoInput" placeholder="Escanear o buscar producto..." class="flex-1 px-5 py-3 border rounded-2xl text-sm outline-none">
                        <button onclick="toggleScanner('vender')" class="bg-slate-100 p-3 rounded-2xl border hover:bg-slate-200">📷</button>
                        <button onclick="buscarProducto()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black text-xs">AÑADIR</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-5">
                    <div id="carritoContenedor" class="space-y-3 min-h-[40px]"></div>
                    <div class="border-t pt-5 space-y-5">
                        <div class="bg-slate-50 p-4 rounded-2xl border space-y-4">
                            <div class="flex gap-2">
                                <button onclick="setTipoPago('contado')" id="btnContado" class="flex-1 py-3 rounded-xl border bg-white font-bold text-xs btn-pago-active">CONTADO</button>
                                <button onclick="setTipoPago('pagos')" id="btnPagos" class="flex-1 py-3 rounded-xl border bg-white font-bold text-xs">A PAGOS</button>
                            </div>
                            <div id="areaRecargo" class="hidden flex justify-between items-center pt-3 border-t">
                                <span class="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Recargo (%)</span>
                                <input type="number" id="recargoVentaInput" value="15" onchange="calcularTotalVenta()" class="w-20 text-right border-2 rounded-xl px-3 py-1 font-black outline-none">
                            </div>
                        </div>
                        <div class="flex justify-between items-end px-2">
                            <span class="text-slate-400 font-black uppercase text-[10px] mb-1">Total Final</span>
                            <span id="totalCarrito" class="text-4xl font-black text-indigo-600 tracking-tighter">$0.00</span>
                        </div>
                        <input type="text" id="clienteNombre" placeholder="Nombre del Cliente" class="w-full px-6 py-4 border rounded-2xl text-sm bg-slate-50 outline-none">
                        <button onclick="procesarVenta()" class="w-full bg-emerald-600 text-white py-5 rounded-[1.8rem] font-black shadow-xl uppercase active:scale-95 transition-all">Registrar Venta</button>
                    </div>
                </div>
            </div>

            <div id="tab-inventario" class="app-tab space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h2 class="font-black text-2xl text-slate-800 uppercase tracking-tighter italic">Inventario</h2>
                    <button onclick="abrirModalProducto()" class="bg-indigo-600 text-white text-[10px] font-black px-6 py-3 rounded-2xl shadow-lg">+ AGREGAR PRODUCTO</button>
                </div>
                <div id="listaInventario" class="grid gap-3"></div>
            </div>

            <div id="tab-config" class="app-tab space-y-4">
                <h2 class="font-black text-2xl text-slate-800 uppercase px-2 tracking-tighter">Administración</h2>
                <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm space-y-5">
                    <h3 class="text-xs font-black uppercase text-slate-400 italic">Crear Nuevo Usuario</h3>
                    <div class="space-y-4">
                        <input type="text" id="nuevoUser" placeholder="Usuario" class="w-full px-5 py-4 border rounded-2xl text-sm outline-none">
                        <input type="password" id="nuevoPass" placeholder="Contraseña" class="w-full px-5 py-4 border rounded-2xl text-sm outline-none">
                        <select id="nuevoRol" class="w-full px-5 py-4 border rounded-2xl text-sm bg-white font-bold outline-none">
                            <option value="Vendedor">Vendedor</option>
                            <option value="Admin">Administrador</option>
                        </select>
                        <button onclick="guardarUsuario()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg">REGISTRAR USUARIO</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bg-white border-t fixed bottom-0 left-0 right-0 h-24 flex items-center justify-around z-50 px-6 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
            <button onclick="switchTab('vender')" class="nav-btn flex flex-col items-center flex-1 py-2 text-slate-300" id="btn-vender">
                <span class="text-2xl mb-1">🛒</span><span class="text-[9px] font-black uppercase">Ventas</span>
            </button>
            <button onclick="switchTab('inventario')" class="nav-btn flex flex-col items-center flex-1 py-2 text-slate-300" id="btn-inventario">
                <span class="text-2xl mb-1">📦</span><span class="text-[9px] font-black uppercase">Stock</span>
            </button>
            <button id="nav-config" onclick="switchTab('config')" class="nav-btn flex flex-col items-center flex-1 py-2 text-slate-300 hidden" id="btn-config">
                <span class="text-2xl mb-1">⚙️</span><span class="text-[9px] font-black uppercase">Admin</span>
            </button>
        </nav>
    </div>

    <div id="modalProducto" class="fixed inset-0 bg-black/70 hidden items-center justify-center p-4 z-[100] backdrop-blur-md">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-md space-y-4 shadow-2xl overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center">
                <h3 class="font-black text-indigo-600 uppercase text-sm" id="modalTitulo">Gestionar Producto</h3>
                <button onclick="cerrarModal()" class="text-slate-300 text-2xl font-bold">✕</button>
            </div>
            <div id="reader-modal" class="rounded-2xl overflow-hidden hidden border-4 border-indigo-50 mb-4"></div>
            <div class="flex gap-2">
                <input type="text" id="prodCodigo" placeholder="Escanear Código..." class="flex-1 px-5 py-4 border rounded-2xl text-sm font-black bg-slate-50 outline-none" onchange="verificarExistente()">
                <button onclick="toggleScanner('modal')" class="bg-slate-100 px-6 rounded-2xl border hover:bg-slate-200">📷</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="prodNombre" placeholder="Nombre del artículo" class="w-full px-5 py-4 border rounded-2xl text-sm font-bold bg-white outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="prodStock" placeholder="Surtir Stock" class="px-5 py-4 border rounded-2xl text-sm font-black bg-slate-50 outline-none">
                    <input type="number" id="prodPrecio" placeholder="Precio" class="px-5 py-4 border rounded-2xl text-sm font-black bg-slate-50 outline-none">
                </div>
            </div>
            <div class="border-2 border-dashed border-slate-200 p-5 rounded-[2rem] bg-slate-50 space-y-4 text-center">
                <div id="previewImagen" class="flex justify-center hidden">
                    <img id="imgActual" src="" class="h-32 w-32 object-cover rounded-[2rem] border-4 border-white shadow-xl">
                </div>
                <div id="progresoContenedor" class="hidden space-y-2">
                    <div class="flex justify-between text-[10px] font-black text-indigo-600 uppercase">
                        <span id="textoStatus">Subiendo...</span><span id="porcentajeTexto">0%</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                        <div id="barraProgreso" class="bg-indigo-600 h-full rounded-full" style="width: 0%"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="document.getElementById('inputCamara').click()" class="bg-white border-2 py-3 rounded-2xl text-[10px] font-black shadow-sm uppercase tracking-tighter">📸 Cámara</button>
                    <button onclick="document.getElementById('inputGaleria').click()" class="bg-white border-2 py-3 rounded-2xl text-[10px] font-black shadow-sm uppercase tracking-tighter">🖼️ Galería</button>
                </div>
                <input type="file" id="inputCamara" accept="image/*" capture="environment" class="hidden" onchange="seleccionarFoto(this)">
                <input type="file" id="inputGaleria" accept="image/*" class="hidden" onchange="seleccionarFoto(this)">
                <input type="hidden" id="prodFoto">
            </div>
            <button id="btnGuardarFinal" onclick="guardarTodoElProducto()" class="w-full bg-indigo-600 text-white py-5 rounded-[1.8rem] font-black uppercase text-xs shadow-xl active:scale-95 transition-all">
                Guardar Cambios
            </button>
        </div>
    </div>

    <script>
        const cloudName = "dcerhuq5d"; 
        const uploadPreset = "sgv_preset";
        
        let db = { inventario: [], usuarios: [] };
        let gasUrl = ""; let usuarioActual = null; let carrito = [];
        let scannerVender = null; let scannerModal = null;
        let tipoPagoActual = 'contado';
        let archivoParaSubir = null;

        function intentarLogin() {
            gasUrl = document.getElementById("gasUrlInput").value.trim();
            if(!gasUrl) return alert("Pega la URL del Script");
            localStorage.setItem("sgv_url", gasUrl);
            fetch(`${gasUrl}?action=obtenerDatos`).then(r => r.json()).then(data => {
                const user = document.getElementById("userInput").value;
                const pass = document.getElementById("passInput").value;
                const found = data.usuarios.find(u => u.Usuario == user && u.Contraseña == pass);
                if (found) { 
                    db = data; usuarioActual = found;
                    document.getElementById("loginScreen").classList.add("hidden");
                    document.getElementById("appScreen").classList.remove("hidden");
                    document.getElementById("userBanner").innerText = `${found.Usuario} | ${found.Rol}`;
                    if(found.Rol === 'Admin') document.getElementById("nav-config").classList.remove("hidden");
                    switchTab('vender'); renderInventario();
                } else alert("Credenciales incorrectas");
            }).catch(e => alert("Error de red o URL inválida."));
        }

        // --- GESTIÓN DE IMÁGENES ---
        function seleccionarFoto(input) {
            if (!input.files[0]) return;
            archivoParaSubir = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById("imgActual").src = e.target.result;
                document.getElementById("previewImagen").classList.remove("hidden");
            };
            reader.readAsDataURL(archivoParaSubir);
        }

        async function guardarTodoElProducto() {
            const cod = document.getElementById("prodCodigo").value.trim();
            const nom = document.getElementById("prodNombre").value.trim();
            const btn = document.getElementById("btnGuardarFinal");
            if(!cod || !nom) return alert("Código y Nombre son campos requeridos.");

            btn.disabled = true;
            btn.innerText = "GUARDANDO...";

            try {
                let urlFotoFinal = document.getElementById("prodFoto").value;
                if (archivoParaSubir) {
                    urlFotoFinal = await subirACloudinary(archivoParaSubir, cod);
                }

                const cantN = parseInt(document.getElementById("prodStock").value) || 0;
                const exist = db.inventario.find(p => p.Código.toString().trim() == cod);
                
                const data = {
                    codigo: cod, nombre: nom,
                    cantidad: exist ? (parseInt(exist.Cantidad) + cantN) : cantN,
                    precioVenta: parseFloat(document.getElementById("prodPrecio").value) || 0,
                    fotoUrl: urlFotoFinal,
                    recargoPagos: exist ? exist.RecargoPagos : 15
                };

                await fetch(gasUrl, { method: "POST", body: JSON.stringify({ action: "actualizarInventario", data: data }) });
                alert("¡Guardado Exitosamente!");
                cerrarModal();
                refresh();
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "GUARDAR CAMBIOS";
            }
        }

        function subirACloudinary(file, codigo) {
            return new Promise((resolve, reject) => {
                const contenedor = document.getElementById("progresoContenedor");
                const barra = document.getElementById("barraProgreso");
                contenedor.classList.remove("hidden");
                
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", uploadPreset);
                formData.append("folder", "fotos_inventario"); // CARPETA PARA LIMPIEZA FÁCIL
                formData.append("public_id", "prod_" + codigo + "_" + Date.now());

                const xhr = new XMLHttpRequest();
                xhr.upload.onprogress = (ev) => {
                    const porc = Math.round((ev.loaded / ev.total) * 100);
                    barra.style.width = porc + "%";
                    document.getElementById("porcentajeTexto").innerText = porc + "%";
                };
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const res = JSON.parse(xhr.responseText);
                        resolve(res.secure_url);
                    } else reject(new Error("Error en subida"));
                };
                xhr.open("POST", `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`);
                xhr.send(formData);
            });
        }

        // --- SISTEMA ---
        function switchTab(t) {
            document.querySelectorAll('.app-tab').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('nav-active'));
            document.getElementById('btn-'+t)?.classList.add('nav-active');
        }

        function renderInventario() {
            document.getElementById("listaInventario").innerHTML = db.inventario.map(p => `
                <div class="bg-white p-5 rounded-[2.5rem] border flex items-center gap-5 shadow-sm">
                    <img src="${p.FotoURL || 'https://via.placeholder.com/100'}" class="w-16 h-16 object-cover rounded-2xl bg-slate-50 border">
                    <div class="flex-1">
                        <p class="font-black text-sm uppercase tracking-tighter">${p.Nombre}</p>
                        <div class="flex gap-2 mt-1">
                            <span class="text-[9px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full uppercase">Stock: ${p.Cantidad}</span>
                            <span class="text-[9px] font-black bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full uppercase">$${p.PrecioVenta}</span>
                        </div>
                    </div>
                    <button onclick="cargarParaEditar('${p.Código}')" class="bg-slate-50 text-indigo-600 p-3 rounded-2xl border">✏️</button>
                </div>`).join('');
        }

        function refresh() {
            fetch(`${gasUrl}?action=obtenerDatos`).then(r => r.json()).then(d => { db = d; renderInventario(); });
        }

        function cerrarModal() {
            document.getElementById("modalProducto").classList.replace("flex", "hidden");
            archivoParaSubir = null;
            document.getElementById("progresoContenedor").classList.add("hidden");
            if(scannerModal) { scannerModal.stop().then(() => scannerModal.clear()); }
        }

        function abrirModalProducto() {
            document.getElementById("modalProducto").classList.replace("hidden", "flex");
            document.getElementById("prodCodigo").value = ""; 
            document.getElementById("prodNombre").value = ""; 
            document.getElementById("prodStock").value = ""; 
            document.getElementById("prodPrecio").value = ""; 
            document.getElementById("prodFoto").value = ""; 
            document.getElementById("previewImagen").classList.add("hidden");
            archivoParaSubir = null;
        }

        function verificarExistente() {
            const cod = document.getElementById("prodCodigo").value.trim();
            const p = db.inventario.find(p => p.Código.toString().trim() == cod);
            if (p) {
                document.getElementById("prodNombre").value = p.Nombre || "";
                document.getElementById("prodPrecio").value = p.PrecioVenta || 0;
                document.getElementById("prodFoto").value = p.FotoURL || "";
                if(p.FotoURL) { 
                    document.getElementById("imgActual").src = p.FotoURL; 
                    document.getElementById("previewImagen").classList.remove("hidden"); 
                }
            }
        }

        function cargarParaEditar(c) { abrirModalProducto(); document.getElementById("prodCodigo").value = c; verificarExistente(); }
        function guardarUsuario() {
            const u = document.getElementById("nuevoUser").value;
            const p = document.getElementById("nuevoPass").value;
            const r = document.getElementById("nuevoRol").value;
            fetch(gasUrl, { method: "POST", body: JSON.stringify({ action: "crearUsuario", data: { usuario: u, password: p, rol: r } }) })
            .then(() => { alert("Usuario Creado"); refresh(); });
        }

        // --- VENTAS ---
        function buscarProducto() {
            const term = document.getElementById("buscarCodigoInput").value.trim();
            const p = db.inventario.find(i => i.Código.toString().trim() == term || i.Nombre.toLowerCase().includes(term.toLowerCase()));
            if(p) {
                if(p.Cantidad <= 0) return alert("Sin stock");
                const enC = carrito.find(c => c.codigo == p.Código);
                if(enC) { if(enC.cantidad + 1 > p.Cantidad) return alert("Stock agotado"); enC.cantidad++; } 
                else carrito.push({ codigo: p.Código, nombre: p.Nombre, precio: p.PrecioVenta, cantidad: 1 });
                renderCarrito(); document.getElementById("buscarCodigoInput").value = "";
            } else alert("No encontrado");
        }

        function renderCarrito() {
            const cont = document.getElementById("carritoContenedor");
            if(carrito.length === 0) cont.innerHTML = `<p class="text-center text-slate-300 text-[10px] font-bold uppercase py-4">Venta Vacía</p>`;
            else {
                cont.innerHTML = carrito.map(i => `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border text-sm font-bold border-slate-100">
                        <div class="flex flex-col"><span class="uppercase text-xs text-slate-700 tracking-tighter">${i.nombre}</span><span class="text-[9px] text-slate-400">$${i.precio} x ${i.cantidad}</span></div>
                        <div class="flex items-center gap-3"><b class="text-indigo-600">$${(i.precio*i.cantidad).toFixed(2)}</b><button onclick="eliminarCarrito('${i.codigo}')" class="text-red-400 ml-2">✕</button></div>
                    </div>`).join('');
            }
            calcularTotalVenta();
        }

        function eliminarCarrito(c) { carrito = carrito.filter(i => i.codigo !== c); renderCarrito(); }
        function procesarVenta() {
            if(carrito.length === 0) return alert("Carrito vacío");
            const data = {
                vendedor: usuarioActual.Usuario, clienteNombre: document.getElementById("clienteNombre").value || "Público General",
                productos: carrito, total: parseFloat(document.getElementById("totalCarrito").innerText.replace("$","")), 
                metodoPago: tipoPagoActual === 'contado' ? 'Contado' : `Pagos (${document.getElementById("recargoVentaInput").value}%)`
            };
            fetch(gasUrl, { method: "POST", body: JSON.stringify({ action: "registrarVenta", data: data }) }).then(() => { 
                alert("Venta Finalizada"); carrito = []; renderCarrito(); refresh(); document.getElementById("clienteNombre").value = "";
            });
        }

        function setTipoPago(t) { tipoPagoActual = t; document.getElementById("btnContado").classList.toggle("btn-pago-active", t==='contado'); document.getElementById("btnPagos").classList.toggle("btn-pago-active", t==='pagos'); document.getElementById("areaRecargo").classList.toggle("hidden", t==='contado'); calcularTotalVenta(); }
        function calcularTotalVenta() { let sub = carrito.reduce((a,i)=>a+(i.precio*i.cantidad),0); let tot = sub; if(tipoPagoActual==='pagos') tot = sub + (sub*(parseFloat(document.getElementById("recargoVentaInput").value)/100)); document.getElementById("totalCarrito").innerText = `$${tot.toFixed(2)}`; }
        function toggleScanner(m) { const cId = m === 'vender' ? "reader-vender" : "reader-modal"; const div = document.getElementById(cId); if (div.classList.contains("hidden")) { div.classList.remove("hidden"); const s = new Html5Qrcode(cId); if (m === 'vender') scannerVender = s; else scannerModal = s; s.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (t) => { if (m === 'vender') { document.getElementById("buscarCodigoInput").value = t; buscarProducto(); } else { document.getElementById("prodCodigo").value = t; verificarExistente(); } toggleScanner(m); }); } else { div.classList.add("hidden"); const s = m === 'vender' ? scannerVender : scannerModal; if(s) { s.stop().then(() => s.clear()); } } }
        function logout() { localStorage.removeItem("sgv_url"); location.reload(); }

        window.onload = () => { if(localStorage.getItem("sgv_url")) document.getElementById("gasUrlInput").value = localStorage.getItem("sgv_url"); };
    </script>
</body>
</html>
