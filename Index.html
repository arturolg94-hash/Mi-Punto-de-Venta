<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGV PRO v3.13.1 - Reportes Interactivos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .app-tab { display: none; }
        .app-tab.active { display: block; }
        .nav-active { color: #4f46e5; border-top: 3px solid #4f46e5; }
        .btn-modo-active { background-color: #4f46e5 !important; color: white !important; }
        #canvasRecibo { width: 320px; background: white; padding: 25px; color: black; font-family: 'Courier New', Courier, monospace; border: 1px solid #eee; }
        #reciboInvisible { position: absolute; left: -9999px; top: 0; }
        .history-dot { position: relative; padding-left: 20px; }
        .history-dot::before { content: ''; position: absolute; left: 0; top: 6px; width: 8px; height: 8px; background: #4f46e5; border-radius: 50%; }
        .prod-item-click:active { background-color: #f1f5f9; transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <div id="loginScreen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center border">
            <h1 class="text-3xl font-black text-indigo-600 mb-8 italic uppercase tracking-tighter">SGV PRO v3.13.1</h1>
            <div class="space-y-4">
                <input type="text" id="gasUrlInput" class="w-full px-6 py-4 border rounded-2xl outline-none" placeholder="URL Script de Google">
                <input type="text" id="userInput" class="w-full px-6 py-4 border rounded-2xl outline-none" placeholder="Usuario" value="admin">
                <input type="password" id="passInput" class="w-full px-6 py-4 border rounded-2xl outline-none" placeholder="Contraseña" value="admin123">
                <button onclick="intentarLogin()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all">ACCEDER</button>
            </div>
        </div>
    </div>

    <div id="appScreen" class="hidden flex-1 flex flex-col">
        <header class="bg-indigo-600 text-white p-5 flex justify-between items-center sticky top-0 z-50 shadow-lg">
            <h1 class="font-black text-xl italic tracking-tighter">SGV PRO</h1>
            <button onclick="logout()" class="text-[10px] font-bold bg-indigo-500 px-4 py-2 rounded-xl">SALIR</button>
        </header>

        <main class="flex-1 p-4 max-w-4xl w-full mx-auto pb-32">
            
            <div id="tab-vender" class="app-tab active space-y-4">
                <div class="flex gap-2 bg-white p-2 rounded-2xl shadow-sm border">
                    <button onclick="setModoOperacion('nueva')" id="btnModoNueva" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase btn-modo-active">Nueva Venta</button>
                    <button onclick="setModoOperacion('pago')" id="btnModoPago" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase bg-slate-50 text-slate-400">Registrar Pago</button>
                </div>

                <div id="areaNuevaVenta" class="space-y-4">
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm flex gap-2">
                        <input type="text" id="buscarCodigoInput" placeholder="Código o Nombre..." class="flex-1 px-5 py-3 border rounded-2xl outline-none">
                        <button onclick="buscarProducto()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase italic">Añadir</button>
                    </div>
                    <div id="carritoContenedor" class="space-y-3"></div>
                    <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-5 text-center">
                        <div class="flex justify-between items-center px-4">
                            <span class="text-[10px] font-black text-slate-400 uppercase italic">Método</span>
                            <div class="flex gap-2">
                                <button onclick="setMetodoVenta('contado')" id="btnMetContado" class="px-4 py-2 rounded-xl border font-black text-[9px] bg-indigo-600 text-white uppercase transition-all">Contado</button>
                                <button onclick="setMetodoVenta('pagos')" id="btnMetPagos" class="px-4 py-2 rounded-xl border font-black text-[9px] bg-white text-slate-400 uppercase transition-all">A Pagos</button>
                            </div>
                        </div>
                        <div id="seccionQuincenas" class="hidden border-t pt-4 flex justify-between items-center px-4">
                            <span class="text-[10px] font-black text-indigo-600 uppercase italic">Plazo (Q)</span>
                            <div class="flex items-center gap-3">
                                <button onclick="cambiarPlazo(-1)" class="w-8 h-8 bg-slate-100 rounded-full font-black">-</button>
                                <span id="txtPlazo" class="font-black text-lg">4</span>
                                <button onclick="cambiarPlazo(1)" class="w-8 h-8 bg-slate-100 rounded-full font-black">+</button>
                            </div>
                        </div>
                        <div class="border-t pt-5 space-y-4 px-2">
                            <span id="totalVentaTxt" class="text-4xl font-black text-indigo-600 tracking-tighter">$0.00</span>
                            <input type="text" id="clienteNombre" placeholder="Nombre del cliente" class="w-full px-6 py-4 border rounded-2xl outline-none bg-slate-50 text-sm font-bold">
                            <div id="contenedorAbonoInicial" class="hidden">
                                <input type="number" id="montoPagado" placeholder="Abono hoy" class="w-full px-6 py-4 border rounded-2xl bg-emerald-50 font-black text-emerald-700">
                            </div>
                            <button onclick="confirmarOperacion()" class="w-full bg-emerald-600 text-white py-5 rounded-[1.8rem] font-black uppercase shadow-xl active:scale-95 transition-all">Finalizar</button>
                        </div>
                    </div>
                </div>

                <div id="areaAbono" class="hidden space-y-4 animate-fade-in">
                    <input type="text" id="inputBusquedaPendiente" oninput="renderListaPendientes()" placeholder="Buscar deudor..." class="w-full px-5 py-4 border rounded-2xl bg-white shadow-sm outline-none">
                    <div id="listaPendientes" class="space-y-3"></div>
                </div>
            </div>

            <div id="tab-inventario" class="app-tab space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h2 class="font-black text-2xl text-slate-800 uppercase italic">Stock Actual</h2>
                    <button onclick="abrirModalProducto()" class="bg-indigo-600 text-white text-[10px] font-black px-6 py-3 rounded-2xl shadow-lg">+ NUEVO</button>
                </div>
                <input type="text" id="filtroStock" oninput="renderInventario()" placeholder="Filtrar por nombre..." class="w-full px-5 py-3 border rounded-xl bg-white outline-none">
                <div id="listaInventario" class="grid gap-3"></div>
            </div>

            <div id="tab-reportes" class="app-tab space-y-4">
                <h2 class="font-black text-2xl text-slate-800 uppercase px-2 italic text-center">Actividad y Pagos</h2>
                <div class="bg-white p-5 rounded-[2rem] border shadow-sm grid grid-cols-2 gap-3">
                    <input type="date" id="fInicio" onchange="renderVentas()" class="px-4 py-2 bg-slate-50 border rounded-xl text-xs outline-none">
                    <input type="date" id="fFin" onchange="renderVentas()" class="px-4 py-2 bg-slate-50 border rounded-xl text-xs outline-none">
                </div>
                <div id="listaVentas" class="space-y-4 pb-12"></div>
            </div>
        </main>

        <nav class="bg-white border-t fixed bottom-0 left-0 right-0 h-24 flex items-center justify-around z-50 px-4 shadow-2xl">
            <button onclick="switchTab('vender')" class="nav-btn flex flex-col items-center flex-1" id="btn-vender">🛒<span class="text-[9px] font-black uppercase mt-1">Ventas</span></button>
            <button onclick="switchTab('inventario')" class="nav-btn flex flex-col items-center flex-1" id="btn-inventario">📦<span class="text-[9px] font-black uppercase mt-1">Inventario</span></button>
            <button onclick="switchTab('reportes')" class="nav-btn flex flex-col items-center flex-1" id="btn-reportes">📊<span class="text-[9px] font-black uppercase mt-1">Reportes</span></button>
        </nav>
    </div>

    <div id="modalInfoProducto" class="fixed inset-0 bg-black/70 hidden items-center justify-center p-4 z-[250] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-sm space-y-4 shadow-2xl border text-center">
            <div id="infoDetalleProducto"></div>
            <button onclick="cerrarModalInfo()" class="w-full bg-slate-100 py-4 rounded-2xl font-black text-[10px] text-slate-400 uppercase tracking-widest">Cerrar</button>
        </div>
    </div>

    <div id="modalAbonarAhora" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-[150] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm space-y-6 shadow-2xl text-center border">
            <div id="infoCuentaSeleccionada"></div>
            <input type="number" id="montoAbonoManual" placeholder="Monto del abono" class="w-full px-6 py-5 border rounded-2xl font-black bg-indigo-50 text-indigo-600 text-center outline-none text-xl shadow-inner">
            <div class="flex gap-2">
                <button onclick="ejecutarAbonoSeleccionado()" class="flex-1 bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase text-[10px]">Registrar Pago</button>
                <button onclick="cerrarModalAbono()" class="px-5 bg-slate-100 py-5 rounded-2xl font-black text-[10px] text-slate-400">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="modalRecibo" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4 z-[200]">
        <div class="flex flex-col items-center gap-6">
            <div id="previewReciboContenedor" class="rounded-xl shadow-2xl bg-white border-4 border-white"><img id="imgReciboFinal" src="" class="max-w-[320px] w-full rounded-lg"></div>
            <div class="flex gap-2 w-full max-w-sm">
                <button onclick="descargarRecibo()" class="flex-1 bg-green-600 text-white py-5 rounded-2xl font-black uppercase text-[10px]">Descargar 📥</button>
                <button onclick="cerrarRecibo()" class="px-6 bg-slate-100 py-5 rounded-2xl font-black text-[10px] uppercase text-slate-400">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="reciboInvisible"><div id="canvasRecibo"></div></div>

    <div id="modalProducto" class="fixed inset-0 bg-black/70 hidden items-center justify-center p-4 z-[100] backdrop-blur-md">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-md space-y-4 border shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="font-black text-indigo-600 uppercase text-xs italic tracking-widest">Almacén Central</h3>
            <input type="text" id="prodCodigo" placeholder="Código..." class="w-full px-5 py-4 border rounded-2xl font-black bg-slate-50 outline-none" onchange="verificarExistente()">
            <input type="text" id="prodNombre" placeholder="Nombre..." class="w-full px-5 py-4 border rounded-2xl font-bold">
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="prodStock" placeholder="Stock" class="px-5 py-4 border rounded-2xl font-black bg-slate-50 outline-none">
                <input type="number" id="prodPrecio" placeholder="Precio" class="px-5 py-4 border rounded-2xl font-black bg-slate-50 outline-none">
            </div>
            <input type="number" id="prodRecargo" placeholder="% Recargo Crédito" class="w-full px-5 py-4 border rounded-2xl font-black text-indigo-600 bg-indigo-50">
            <div class="border-2 border-dashed p-4 rounded-[2rem] text-center bg-slate-50">
                <div id="previewImagen" class="hidden mb-3"><img id="imgActual" src="" class="h-24 w-24 object-cover mx-auto rounded-3xl shadow-lg border-4 border-white"></div>
                <button onclick="document.getElementById('inputCamara').click()" class="bg-white border px-6 py-3 rounded-2xl text-[10px] font-black shadow-sm">CAPTURAR FOTO</button>
                <input type="file" id="inputCamara" accept="image/*" capture="environment" class="hidden" onchange="seleccionarFoto(this)">
                <input type="hidden" id="prodFoto">
            </div>
            <button onclick="guardarTodoElProducto()" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black uppercase text-xs shadow-xl">Guardar</button>
        </div>
    </div>

    <script>
        let db = { inventario: [], usuarios: [], ventas: [] };
        let gasUrl = ""; let usuarioActual = null; let carrito = [];
        let modoOperacion = 'nueva'; let metodoVenta = 'contado'; let plazoQuincenas = 4;
        let cuentaParaAbonar = null;

        function intentarLogin() {
            gasUrl = document.getElementById("gasUrlInput").value.trim();
            localStorage.setItem("sgv_url", gasUrl);
            fetch(`${gasUrl}?action=obtenerDatos`).then(r => r.json()).then(data => {
                const user = document.getElementById("userInput").value;
                const pass = document.getElementById("passInput").value;
                const found = data.usuarios.find(u => u.Usuario == user && u.Contraseña == pass);
                if (found) { 
                    db = data; usuarioActual = found;
                    document.getElementById("loginScreen").classList.add("hidden");
                    document.getElementById("appScreen").classList.remove("hidden");
                    refresh();
                } else alert("Error de acceso.");
            }).catch(e => alert("Error conectando con el servidor."));
        }

        // --- FUNCIONES DE NAVEGACIÓN ---
        function switchTab(t) { 
            document.querySelectorAll('.app-tab').forEach(e => e.classList.remove('active')); 
            document.getElementById('tab-'+t).classList.add('active'); 
            document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('text-indigo-600'));
            document.getElementById('btn-'+t).classList.add('text-indigo-600');
            if(t==='reportes') renderVentas(); 
            if(t==='inventario') renderInventario();
        }

        function setModoOperacion(m) {
            modoOperacion = m;
            document.getElementById("btnModoNueva").className = m === 'nueva' ? "flex-1 py-3 rounded-xl font-black text-[10px] uppercase btn-modo-active" : "flex-1 py-3 rounded-xl font-black text-[10px] uppercase bg-slate-50 text-slate-400";
            document.getElementById("btnModoPago").className = m === 'pago' ? "flex-1 py-3 rounded-xl font-black text-[10px] uppercase btn-modo-active" : "flex-1 py-3 rounded-xl font-black text-[10px] uppercase bg-slate-50 text-slate-400";
            document.getElementById("areaNuevaVenta").classList.toggle("hidden", m !== 'nueva');
            document.getElementById("areaAbono").classList.toggle("hidden", m !== 'pago');
            if(m === 'pago') renderListaPendientes();
        }

        function setMetodoVenta(m) {
            metodoVenta = m;
            document.getElementById("btnMetContado").className = m === 'contado' ? "px-4 py-2 rounded-xl border font-black text-[9px] bg-indigo-600 text-white uppercase" : "px-4 py-2 rounded-xl border font-black text-[9px] bg-white text-slate-400 uppercase";
            document.getElementById("btnMetPagos").className = m === 'pagos' ? "px-4 py-2 rounded-xl border font-black text-[9px] bg-indigo-600 text-white uppercase" : "px-4 py-2 rounded-xl border font-black text-[9px] bg-white text-slate-400 uppercase";
            document.getElementById("seccionQuincenas").classList.toggle("hidden", m !== 'pagos');
            document.getElementById("contenedorAbonoInicial").classList.toggle("hidden", m === 'contado');
            renderCarrito();
        }

        // --- GESTIÓN DE CARRITO ---
        function buscarProducto() {
            const term = document.getElementById("buscarCodigoInput").value.trim();
            const p = db.inventario.find(i => (i.Código || "").toString() == term || (i.Nombre || "").toLowerCase().includes(term.toLowerCase()));
            if (p) {
                if (p.Cantidad <= 0) return alert("Sin existencias.");
                const enC = carrito.find(c => c.codigo == p.Código);
                if (enC) enC.cantidad++;
                else carrito.push({ codigo: p.Código, nombre: p.Nombre, precio: p.PrecioVenta, cantidad: 1, foto: p.FotoURL, recargo: p.RecargoPagos || 15 });
                renderCarrito(); document.getElementById("buscarCodigoInput").value = "";
            }
        }

        function modificarCantidad(codigo, n) {
            const item = carrito.find(c => c.codigo == codigo);
            if (!item) return;
            item.cantidad += n;
            if (item.cantidad <= 0) carrito = carrito.filter(c => c.codigo != codigo);
            renderCarrito();
        }

        function renderCarrito() {
            const cont = document.getElementById("carritoContenedor");
            if (carrito.length === 0) {
                cont.innerHTML = "<p class='text-center text-slate-300 font-black uppercase text-[10px] py-6 italic'>Vacío</p>";
                document.getElementById("totalVentaTxt").innerText = "$0.00";
                return;
            }
            let suma = 0;
            cont.innerHTML = carrito.map(i => {
                let pf = metodoVenta === 'pagos' ? i.precio * (1 + (i.recargo / 100)) : i.precio;
                suma += (pf * i.cantidad);
                return `
                <div class="bg-white p-3 rounded-[1.5rem] border flex items-center gap-3 shadow-sm">
                    <img src="${i.foto || 'https://via.placeholder.com/50'}" class="w-10 h-10 object-cover rounded-xl border">
                    <div class="flex-1">
                        <p class="font-black text-[10px] uppercase truncate w-32 tracking-tighter">${i.nombre}</p>
                        <p class="text-[9px] font-bold text-indigo-600">$${pf.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-50 px-2 py-1 rounded-full border">
                        <button onclick="modificarCantidad('${i.codigo}', -1)" class="w-6 h-6 flex items-center justify-center bg-white rounded-full font-black border shadow-sm">-</button>
                        <span class="font-black text-xs min-w-[20px] text-center">${i.cantidad}</span>
                        <button onclick="modificarCantidad('${i.codigo}', 1)" class="w-6 h-6 flex items-center justify-center bg-white rounded-full font-black border shadow-sm">+</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById("totalVentaTxt").innerText = `$${suma.toFixed(2)}`;
        }

        // --- GESTIÓN DE REPORTES E INTERACTIVIDAD (NUEVO v3.13.1) ---
        function verInfoDetalleDesdeReporte(codigo) {
            const p = db.inventario.find(i => i.Código.toString() === codigo.toString());
            const modal = document.getElementById("modalInfoProducto");
            const cont = document.getElementById("infoDetalleProducto");
            
            if (p) {
                cont.innerHTML = `
                    <img src="${p.FotoURL || 'https://via.placeholder.com/100'}" class="w-24 h-24 object-cover mx-auto rounded-3xl mb-4 border-2 shadow-lg">
                    <p class="text-[10px] font-black text-indigo-600 uppercase italic tracking-widest">${p.Nombre}</p>
                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <div class="bg-slate-50 p-3 rounded-2xl border text-center">
                            <p class="text-[8px] font-black text-slate-400 uppercase">Stock Actual</p>
                            <p class="text-xl font-black">${p.Cantidad}</p>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl border text-center">
                            <p class="text-[8px] font-black text-slate-400 uppercase">Precio</p>
                            <p class="text-xl font-black text-indigo-600">$${p.PrecioVenta}</p>
                        </div>
                    </div>
                    <p class="text-[8px] font-black text-slate-300 mt-4 uppercase">Código de barras: ${p.Código}</p>
                `;
            } else {
                cont.innerHTML = `<p class="text-xs font-black text-red-500 uppercase italic">Este producto ya no existe en el inventario.</p>`;
            }
            modal.classList.replace("hidden", "flex");
        }

        function cerrarModalInfo() { document.getElementById("modalInfoProducto").classList.replace("flex", "hidden"); }

        function renderVentas() {
            const cont = document.getElementById("listaVentas");
            if (!db.ventas || db.ventas.length === 0) { cont.innerHTML = "<p class='text-center opacity-30 py-10 font-black italic'>Historial vacío</p>"; return; }
            const fIn = document.getElementById("fInicio").value;
            const fFi = document.getElementById("fFin").value;
            const filtradas = db.ventas.filter(v => { const fv = new Date(v.Fecha).toISOString().split('T')[0]; return (!fIn || fv >= fIn) && (!fFi || fv <= fFi); }).reverse();

            cont.innerHTML = filtradas.map(v => {
                let itemsHtml = "";
                let abonosHtml = "";
                try {
                    const lista = typeof v.Productos === 'string' ? JSON.parse(v.Productos) : v.Productos;
                    if(Array.isArray(lista)) {
                        itemsHtml = lista.map(p => `
                        <div onclick="verInfoDetalleDesdeReporte('${p.codigo}')" class="flex justify-between items-center py-2 border-b border-slate-50 last:border-0 prod-item-click p-1 rounded-xl transition-all cursor-pointer">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black uppercase text-slate-700">${p.nombre}</span>
                                <span class="text-[9px] font-black text-indigo-500 italic">STOCK: ${p.stockAnterior || '?'} ➔ ${p.stockNuevo || '?'}</span>
                            </div>
                            <b class="text-[10px] text-slate-800">$${(p.precioFinal*p.cantidad).toFixed(2)}</b>
                        </div>`).join('');
                    }
                } catch(e) { itemsHtml = `<p class="text-[9px] font-bold text-slate-300 italic uppercase">Cargando datos...</p>`; }

                try {
                    const hist = JSON.parse(v.MetodoPago);
                    if(hist.abonos && hist.abonos.length > 0) {
                        abonosHtml = `<div class="mt-4 p-4 bg-indigo-50 rounded-2xl border border-indigo-100 animate-fade-in shadow-inner">
                            <p class="text-[8px] font-black text-indigo-400 uppercase mb-2 tracking-widest italic">Línea de Tiempo de Pagos:</p>
                            ${hist.abonos.map(a => `<p class="text-[9px] history-dot font-black text-slate-600 mb-1">${new Date(a.fecha).toLocaleDateString()} - <span class="text-indigo-600">$${parseFloat(a.monto).toFixed(2)}</span> <span class="text-[7px] text-slate-400 opacity-60">(${a.vendedor || 'Admin'})</span></p>`).join('')}
                        </div>`;
                    }
                } catch(e) { abonosHtml = `<p class="text-[9px] mt-2 italic text-slate-400 uppercase tracking-widest text-center">Sin abonos registrados</p>`; }

                return `
                <div class="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden mb-4 border-slate-100">
                    <div class="bg-slate-50 p-5 flex justify-between items-center border-b">
                        <div><p class="text-[10px] font-black text-indigo-600 uppercase italic">CLIENTE: ${v.ClienteNombre}</p><p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${new Date(v.Fecha).toLocaleString()}</p></div>
                        <span class="bg-white border text-indigo-600 font-black text-[9px] px-3 py-1 rounded-full shadow-sm uppercase italic">Operación</span>
                    </div>
                    <div class="p-5">
                        <p class="text-[8px] font-black text-slate-300 uppercase mb-2 tracking-tighter">Artículos Comprados (Toca para ver stock):</p>
                        ${itemsHtml}
                        ${abonosHtml}
                    </div>
                    <div class="bg-indigo-50 p-4 flex justify-between items-center border-t border-indigo-100/50">
                        <span class="text-[10px] font-black text-indigo-400 uppercase">ID: ${v['ID Venta']}</span>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-400 uppercase italic">Adeudo</p>
                            <b class="text-2xl font-black text-indigo-600 tracking-tighter">$${parseFloat(v.ClienteContacto || 0).toFixed(2)}</b>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // --- RESTO DE FUNCIONES MANTENIDAS (COBRANZA, INVENTARIO, ETC.) ---
        function renderListaPendientes() {
            const cont = document.getElementById("listaPendientes");
            const q = document.getElementById("inputBusquedaPendiente").value.toLowerCase();
            const pendientes = db.ventas.filter(v => parseFloat(v.ClienteContacto) > 0 && v.ClienteNombre.toLowerCase().includes(q)).reverse();
            cont.innerHTML = pendientes.map(v => `<div onclick="abrirAbonoDirecto('${v['ID Venta']}', ${v.ClienteContacto}, '${v.ClienteNombre}', ${v.Total})" class="bg-white p-5 rounded-[2rem] border shadow-sm flex justify-between items-center active:scale-95 transition-all"><div><p class="text-[10px] font-black text-indigo-600 uppercase italic">${v.ClienteNombre}</p><p class="text-[8px] text-slate-400">${v['ID Venta']}</p></div><b class="text-xl font-black tracking-tighter">$${parseFloat(v.ClienteContacto).toFixed(2)}</b></div>`).join('');
        }

        function abrirAbonoDirecto(id, saldo, nombre, total) {
            cuentaParaAbonar = { id, saldo, nombre, totalOriginal: total };
            document.getElementById("infoCuentaSeleccionada").innerHTML = `<p class="font-black text-indigo-600 uppercase text-xs">${nombre}</p><div class="bg-slate-50 p-4 rounded-2xl border my-2"><p class="text-[9px] font-black text-slate-400 uppercase mb-1">Adeudo</p><p class="text-3xl font-black text-slate-800">$${saldo.toFixed(2)}</p></div>`;
            document.getElementById("modalAbonarAhora").classList.replace("hidden", "flex");
        }

        async function ejecutarAbonoSeleccionado() {
            const m = parseFloat(document.getElementById("montoAbonoManual").value);
            if(!m || m <= 0 || m > cuentaParaAbonar.saldo) return alert("Cantidad incorrecta.");
            const d = { vendedor: usuarioActual.Usuario, cliente: cuentaParaAbonar.nombre, idVenta: cuentaParaAbonar.id.toString().trim(), pagoActual: m, saldoPendiente: cuentaParaAbonar.saldo - m, plazos: "ABONO", totalOperacion: cuentaParaAbonar.totalOriginal, metodo: "PAGO ABONO", esAbono: true };
            await fetch(gasUrl, { method: "POST", body: JSON.stringify({ action: "registrarVenta", data: d }) });
            generarReciboImagen({...d, fecha: new Date()}); cerrarModalAbono(); refresh();
        }

        async function confirmarOperacion() {
            if (carrito.length === 0) return alert("Agregue productos.");
            const cl = document.getElementById("clienteNombre").value.trim();
            const tv = parseFloat(document.getElementById("totalVentaTxt").innerText.replace("$", ""));
            const ab = metodoVenta === 'contado' ? tv : (parseFloat(document.getElementById("montoPagado").value) || 0);
            if (!cl) return alert("Escriba el nombre del cliente.");
            const pd = carrito.map(i => { const inv = db.inventario.find(p => p.Código.toString() == i.codigo.toString()); return { ...i, precioFinal: (metodoVenta === 'pagos' ? i.precio * (1 + (i.recargo/100)) : i.precio), stockAnterior: inv ? inv.Cantidad : '?', stockNuevo: inv ? (inv.Cantidad - i.cantidad) : '?' }; });
            const data = { vendedor: usuarioActual.Usuario, cliente: cl, productos: pd, totalOperacion: tv, pagoActual: ab, saldoPendiente: tv - ab, metodo: metodoVenta.toUpperCase(), plazos: metodoVenta==='pagos' ? `1/${plazoQuincenas}` : "1/1", esAbono: false };
            const r = await fetch(gasUrl, { method: "POST", body: JSON.stringify({ action: "registrarVenta", data: data }) }).then(res => res.json());
            generarReciboImagen({...data, idVenta: r.idVenta, fecha: new Date()});
            carrito = []; renderCarrito(); refresh(); document.getElementById("clienteNombre").value = ""; document.getElementById("montoPagado").value = "";
        }

        function generarReciboImagen(d) {
            const ticket = document.getElementById("canvasRecibo");
            let items = d.productos ? d.productos.map(p => `<div style="display:flex; justify-content:space-between; margin-bottom: 4px; font-size:10px;"><span>${p.cantidad}x ${p.nombre.substring(0,18)}</span><span>$${(p.precioFinal*p.cantidad).toFixed(2)}</span></div>`).join('') : `REGISTRO DE ABONO`;
            ticket.innerHTML = `<div style="text-align:center; font-weight:900; border-bottom:2px dashed #000; padding-bottom:15px; margin-bottom:15px; font-size:14px;">*** SGV PRO v3.13.1 ***</div><div style="font-size:10px; margin-bottom:15px;"><b>FECHA:</b> ${new Date().toLocaleString()}<br><b>ID:</b> ${d.idVenta}<br><b>CLIENTE:</b> ${d.cliente}</div><div style="border-bottom:1px dashed #ccc; padding-bottom:15px; margin-bottom:15px;">${items}</div><div style="font-weight:900; text-align:right; font-size:12px;">TOTAL: $${parseFloat(d.totalOperacion).toFixed(2)}<br>PAGO: $${parseFloat(d.pagoActual).toFixed(2)}<br>SALDO: $${parseFloat(d.saldoPendiente).toFixed(2)}</div>`;
            setTimeout(() => { html2canvas(ticket).then(c => { document.getElementById("imgReciboFinal").src = c.toDataURL("image/png"); document.getElementById("modalRecibo").classList.remove("hidden"); }); }, 400);
        }

        function renderInventario() {
            const q = document.getElementById("filtroStock").value.toLowerCase();
            const f = db.inventario.filter(p => (p.Nombre || "").toLowerCase().includes(q) || (p.Código || "").toString().includes(q));
            document.getElementById("listaInventario").innerHTML = f.map(p => `<div class="bg-white p-4 rounded-[2rem] border flex items-center gap-4 shadow-sm border-slate-100"><img src="${p.FotoURL || 'https://via.placeholder.com/100'}" class="w-14 h-14 object-cover rounded-2xl border shadow-sm"><div class="flex-1"><p class="font-black text-[11px] uppercase truncate w-32 tracking-tighter">${p.Nombre}</p><p class="text-[9px] font-bold text-indigo-600 italic italic">Stock: ${p.Cantidad} | $${p.PrecioVenta}</p></div><button onclick="cargarParaEditar('${p.Código}')" class="bg-slate-50 p-4 rounded-2xl border active:bg-indigo-600 active:text-white transition-all shadow-sm">✏️</button></div>`).join('');
        }

        function refresh() { fetch(`${gasUrl}?action=obtenerDatos`).then(r => r.json()).then(d => { db = d; renderInventario(); renderVentas(); if(modoOperacion === 'pago') renderListaPendientes(); }); }
        function logout() { location.reload(); }
        function cerrarModalAbono() { document.getElementById("modalAbonarAhora").classList.replace("flex", "hidden"); document.getElementById("montoAbonoManual").value = ""; }
        function cerrarRecibo() { document.getElementById("modalRecibo").classList.add("hidden"); }
        function abrirModalProducto() { document.getElementById("modalProducto").classList.remove("hidden"); }
        function cerrarModal() { document.getElementById("modalProducto").classList.add("hidden"); }
        function cargarParaEditar(c) { abrirModalProducto(); document.getElementById("prodCodigo").value = c; verificarExistente(); }
        function verificarExistente() { const cod = document.getElementById("prodCodigo").value.trim(); const p = db.inventario.find(p => (p.Código || "").toString() == cod); if (p) { document.getElementById("prodNombre").value = p.Nombre || ""; document.getElementById("prodPrecio").value = p.PrecioVenta || 0; document.getElementById("prodRecargo").value = p.RecargoPagos || 15; document.getElementById("prodFoto").value = p.FotoURL || ""; if(p.FotoURL) { document.getElementById("imgActual").src = p.FotoURL; document.getElementById("previewImagen").classList.remove("hidden"); } } }
        async function guardarTodoElProducto() { const d = { codigo: document.getElementById("prodCodigo").value.trim(), nombre: document.getElementById("prodNombre").value.trim(), cantidad: parseInt(document.getElementById("prodStock").value) || 0, precioVenta: parseFloat(document.getElementById("prodPrecio").value) || 0, recargoPagos: parseFloat(document.getElementById("prodRecargo").value) || 15, fotoUrl: document.getElementById("prodFoto").value }; await fetch(gasUrl, { method: "POST", body: JSON.stringify({ action: "actualizarInventario", data: d }) }); cerrarModal(); refresh(); }
        function seleccionarFoto(i) { if (!i.files[0]) return; const r = new FileReader(); r.onload = (e) => { document.getElementById("imgActual").src = e.target.result; document.getElementById("previewImagen").classList.remove("hidden"); document.getElementById("prodFoto").value = e.target.result; }; r.readAsDataURL(i.files[0]); }
        function descargarRecibo() { const link = document.createElement('a'); link.download = `SGV_Recibo_${Date.now()}.png`; link.href = document.getElementById("imgReciboFinal").src; link.click(); }
        window.onload = () => { if(localStorage.getItem("sgv_url")) document.getElementById("gasUrlInput").value = localStorage.getItem("sgv_url"); };
    </script>
</body>
</html>
